<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>To-Do Liste</title>
<style>
body {
    font-family: system-ui, sans-serif;
    background-color: #16171d;
    color: #f3f4f6;
    text-align: center;
    padding: 50px;
}

h1 {
    color: #c084fc;
}

input[type="text"] {
    padding: 10px;
    width: 250px;
    border-radius: 5px;
    border: 1px solid #ccc;
    margin-right: 10px;
}

button {
    padding: 10px 20px;
    border-radius: 5px;
    border: none;
    background-color: #c084fc;
    color: #16171d;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: #a855f7;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    margin: 10px 0;
    font-size: 18px;
}

li.done {
    text-decoration: line-through;
    color: #9ca3af;
}
</style>
</head>
<body>

<h1>Meine To-Do-Liste</h1>

<input type="text" id="taskInput" placeholder="Neue Aufgabe...">
<button onclick="addTask()">Hinzufügen</button>

<ul id="taskList"></ul>

<script>
function addTask() {
    const input = document.getElementById("taskInput");
    const task = input.value.trim();
    if (task === "") return;

    const li = document.createElement("li");
    li.textContent = task;

    li.onclick = function() {
        li.classList.toggle("done");
    };

    document.getElementById("taskList").appendChild(li);
    input.value = "";
}
</script>

</body>
</html>
